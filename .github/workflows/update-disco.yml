name: Update Discoveries Directory
on:
  schedule:
    - cron: '0 */5 * * *'
  workflow_dispatch:

jobs:
  update-discoveries:
    if: ${{ github.repository == 'max-ostapenko/discovery-artifact-manager' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write      # push feed commits
      pull-requests: write # create/update PRs via gh
      issues: write        # add automerge label
      id-token: write      # Workload Identity Federation
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v7
        with:
          # Need at least 2 commits of history so git diff HEAD~1 works
          fetch-depth: 2

      - name: Authenticate to Google Cloud (ADC)
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Install Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install google-genai google-auth

      - name: Update discoveries, generate feed, and open PR
        run: |
          python scripts/update_disco.py && python scripts/open_pr.py

